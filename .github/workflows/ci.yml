name: CI

'on':
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      WHITAKER_INSTALLER_VERSION: '0.2.5'
      MDTABLEFIX_GIT_REV: '6b1ed9582017ac7832324ada3e9016270c8a5198'
      MARKDOWNLINT_CLI2_VERSION: '0.22.1'
      MERMAN_CLI_VERSION: '0.8.0-alpha.2'
      NIXIE_CLI_VERSION: '1.1.0'
      NIXIE_PYTHON_VERSION: '3.14'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@7da7c6d89033d13cbb1c64803d108ddca97e69c2
      - name: Install mold linker
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update \
            && sudo apt-get install --yes --no-install-recommends clang mold
      - name: Format
        run: make check-fmt
      - name: Typecheck
        run: make typecheck
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd
        with:
          globs: |
            **/*.md
            !**/target/**
            !**/dist/**
      - name: Install Mermaid validators
        run: |
          uv tool install --python "${{ env.NIXIE_PYTHON_VERSION }}" --managed-python "nixie-cli==${{ env.NIXIE_CLI_VERSION }}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          cargo binstall --no-confirm merman-cli@${{ env.MERMAN_CLI_VERSION }}
      - name: Mermaid diagrams
        run: make nixie
      - name: Cache Markdown formatter tools
        id: cache-markdown-formatters
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: ~/.local/share/mapsplice/markdown-formatters
          key: markdown-formatters-v1-${{ runner.os }}-${{ runner.arch }}-${{ env.MDTABLEFIX_GIT_REV }}-${{ env.MARKDOWNLINT_CLI2_VERSION }}
      - name: Install Markdown formatter tools
        env:
          MARKDOWNLINT_CLI2_VERSION: ${{ env.MARKDOWNLINT_CLI2_VERSION }}
          MDTABLEFIX_GIT_REV: ${{ env.MDTABLEFIX_GIT_REV }}
        run: |
          set -euo pipefail

          formatter_root="$HOME/.local/share/mapsplice/markdown-formatters"
          cargo_root="$formatter_root/cargo"
          npm_root="$formatter_root/npm"

          mkdir -p "$cargo_root/bin" "$npm_root/bin"
          export PATH="$cargo_root/bin:$npm_root/bin:$PATH"
          echo "$cargo_root/bin" >> "$GITHUB_PATH"
          echo "$npm_root/bin" >> "$GITHUB_PATH"

          if [ ! -x "$cargo_root/bin/mdtablefix" ]; then
            cargo install \
              --git https://github.com/leynos/mdtablefix \
              --rev "$MDTABLEFIX_GIT_REV" \
              --locked \
              --root "$cargo_root" \
              mdtablefix
          fi
          if [ ! -x "$npm_root/bin/markdownlint-cli2" ]; then
            npm install --global --prefix "$npm_root" \
              "markdownlint-cli2@$MARKDOWNLINT_CLI2_VERSION"
          fi
          mdtablefix --version
          markdownlint-cli2 --version
      - name: Cache Whitaker installation
        id: cache-whitaker
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.local/bin/whitaker
            ~/.dylint_drivers
            ~/.local/share/whitaker
          key: whitaker-v2-${{ runner.os }}-${{ runner.arch }}-${{ env.WHITAKER_INSTALLER_VERSION }}
      - name: Install Whitaker
        run: |
          if [ "${{ steps.cache-whitaker.outputs.cache-hit }}" != "true" ]; then
            cargo binstall --no-confirm whitaker-installer@${{ env.WHITAKER_INSTALLER_VERSION }}
          fi
          whitaker-installer --cranelift
      - name: Lint
        run: make lint
      - name: Test and Measure Coverage
        uses: leynos/shared-actions/.github/actions/generate-coverage@7da7c6d89033d13cbb1c64803d108ddca97e69c2
        with:
          output-path: lcov.info
          format: lcov
      - name: Upload coverage data to CodeScene
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: ${{ env.CS_ACCESS_TOKEN }}
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@7da7c6d89033d13cbb1c64803d108ddca97e69c2
        with:
          format: lcov
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}
